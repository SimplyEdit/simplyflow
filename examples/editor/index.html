<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyFlow code editor with domsignal</title>
    <!-- link href="prism.css" rel="stylesheet" / -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/prismjs/prism-themes/themes/prism-cb.css">
    <style>
      .editor {
        font-family: monospace;
        font-size: 1rem;
        line-height: normal;
        display: grid;
        grid-template: "scroll" "status";
        grid-template-rows: 100fr 1fr;
        tab-size: 4;
        background-color: #333;
        color: white;
        border-radius: 5px;
        overflow: hidden;
        width: 80vw;
        max-height: 80vh;
      }
      .editor-scroll {
        display: grid;
        grid-template: "gutter editor";
        grid-template-columns: 1fr 100fr;
        gap: 3px;
        overflow: auto;
        min-height: 10rem;
        height: 100%;
        width: 100%;
      }
      pre[class*="language-"],
      .editor-highlight,
      .editor textarea {
        font-size: inherit;
        font-family: inherit;
        grid-area: editor;
        border: none;
        background-color: inherit;
        margin: 0;
        padding: 0;
        line-height: inherit;
        tab-size: inherit;
        white-space: pre;
      }
      .editor textarea:focus {
        outline: none;
      }
      .editor-gutter {
        background-color: #444;
        grid-area: gutter;
        padding: 0 5px;
        text-align: right;
        color: #CCC;
      }
      .editor-lines {
        margin: 0;
        font-size: inherit;
        line-height: inherit;
        white-space: pre;
      }
      .editor textarea {
        background: transparent;
        color: transparent;
        caret-color: white;
      }
      pre[class*="language-"],
      .editor textarea,
      .editor-gutter {
        padding-top: 3px;
        padding-bottom: 3px;
      }
      .editor-status {
        grid-area: status;
        font-size: 0.75em;
      }
      .editor-cursor {
        color: #AAA;
        margin: 3px;
      }
    </style>
    <script src="prism.js" data-manual></script>
  </head>
  <body>
    <h1>SimplyFlow code editor with domSignal</h1>
    <p>Editor:</p>
    <div id="editor" class="editor" data-code-lang="js">
      <div class="editor-scroll">
        <div id="gutter" class="editor-gutter"></div>
        <pre class="editor-highlight language-html" id="highlight"></pre>
        <textarea id="editorInner" spellcheck="false">
<html>
<style>
.foo {
  color: red;
}
</style>
<script>
function bar() {
}
</script>
        </textarea>
      </div>
      <div id="drawer" class="editor-status">
        <div id="cursor" class="editor-cursor"></div>
      </div>
    </div>
    <script src="../../dist/simply.flow.js"></script>
    <script>
      const editor = document.getElementById('editor')
      const editorContent = document.getElementById('editorInner')
      const highlight = document.getElementById('highlight')
      const gutter = document.getElementById('gutter')

      const state = simply.state.signal({})
      const demo = simply.dom.signal(editorContent)

      /* content and lines signals */
      simply.state.effect(() => {
        state.content = demo.value
        state.lines = demo.value.split("\n")
      })

      /* line gutter */
      simply.state.effect(() => {
        updateLines(editor, state.lines.length)
      })

      function updateLines(container, lines) {
        gutter.innerHTML = Array.from({
          length: lines
        }, (_, i) => i+1).join("\n")
      }

      /* syntax highlighting */
      simply.state.effect(() => {
        highlight.innerHTML = Prism.highlight(state.content, Prism.languages.html, 'html')
      })

      /* selection signal */
      state.selection = null
      editorContent.addEventListener('selectionchange', function(evt) {
        state.selection = {
          start: editorContent.selectionStart,
          end: editorContent.selectionEnd,
          before: editorContent.value.substring(0, editorContent.selectionStart).split("\n"),
          after: editorContent.value.substring(editorContent.selectionEnd).split("\n")
        }
      })

      /* cursor signal and ui */
      state.cursor = {
        line: 1,
        col: 1
      }
      simply.state.effect(() => {
        if (state.selection?.before) {
          state.cursor = {
            line: state.selection.before.length || 1,
            column: state.selection.before[state.selection.before.length-1].length+1
          }
        }
      })

      const cursor = document.getElementById('cursor')
      simply.state.effect(() => {
        if (state.selection?.start!=state.selection?.end) {
          let lines = ''
          if (state.block) {
            lines = state.block.end - state.block.start
            if (lines===1) {
              lines += ' line, '
            } else {
              lines += ' lines, '
            }
          }
          cursor.innerHTML = lines + (state.selection.end - state.selection.start) + ' characters selected'
        } else {
          cursor.innerHTML = 'Line '+state.cursor.line+', column '+state.cursor.column
        }
      })

      /* indent/outdent */
      simply.state.effect(() => {
        if (state.selection) {
          const lines = {
            start: state.selection?.before.length-1
          }
          lines.end = state.lines.length - state.selection?.after.length
          if (lines.start == lines.end) {
            state.block = null
          } else {
            state.block = lines
          }
        }
      })

      editorContent.addEventListener('keydown', function(evt) {
          switch(evt.key) {
            case 'Tab':
              if (evt.shiftKey) {
                if (state.block) {
                  blockChange(editorContent, state.block.start, state.block.end, outdentCode)
                }
              } else if (state.block) {
                blockChange(editorContent, state.block.start, state.block.end, indentCode)
              } else {
                insertTab(editorContent, editorContent.selectionStart, editorContent.selectionEnd)
              }
              fireInput(evt)
              break
            case '/':
              if (evt.ctrlKey) {
                blockChange(editorContent, state.block.start, state.block.end, toggleBlockComments)
              }
              fireInput(evt)
              break
        }
      })

      function fireInput(evt) {
        evt.preventDefault()
        evt.target.dispatchEvent(new Event('input', { bubbles: true }));
      }

      function insertTab(textarea, start, end) {
        textarea.value = textarea.value.substring(0, start) + "\t" + textarea.value.substring(end)
        textarea.selectionStart = start + 1
        textarea.selectionEnd = textarea.selectionStart
      }

      function blockChange(textarea, start, end, fn) {
        const block = state.lines.slice(start, end)
        let outblock, outcount;
        [ outblock, outcount ] = fn(block)
        console.log(outblock, outcount)
        const selection = { start: state.selection.start, end: state.selection.end}
        textarea.value = state.lines.slice(0, start).concat(outblock).concat(state.lines.slice(end)).join("\n")
        textarea.selectionStart = selection.start
        textarea.selectionEnd = selection.end + outcount
      }

      function indentCode(block) {
        let count = 0
        const indented = block.map(line => {
          count++ //inserted characters
          return "\t"+line
        })
        return [ indented, count ]
      }

      function outdentCode(block) {
        let count = 0
        const outdented = block.map(line => {
          if (line[0]==="\t") {
            count++ //removed characters
            return line.substring(1)
          }
          return line
        })
        return [ outdented, count ]
      }

      function toggleBlockComments(block) {
        if (block[0].substring(0,3)=="//\t") {
          return uncommentBlock(block)
        } else {
          return commentBlock(block)
        }
      }

      function commentBlock(block) {
        let count = 0
        block = block.map(line => {
          count += 3
          return "//\t" + line
        })
        return [block, count]
      }

      function uncommentBlock(block) {
        count = 0
        block = block.map(line => {
          if (line.substring(0,3)=="//\t") {
            line = line.substring(3)
            count -= 3
          }
          return line
        })
        return [block, count]
      }
    </script>
  </body>
</html>
