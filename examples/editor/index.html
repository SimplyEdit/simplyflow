<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyFlow code editor with domsignal</title>
    <!-- href="prism.css" rel="stylesheet" -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/prismjs/prism-themes/themes/prism-cb.css">
    <link rel="stylesheet" href="style.css">
    <script src="prism.js" data-manual></script>
    <script src="acorn.js"></script>
    <script src="../../dist/simply.flow.js" ></script>
  </head>
  <body>
    <h1>SimplyFlow code editor with domSignal</h1>
    <p>Editor:</p>
    <div id="editor" class="editor" data-code-lang="javascript">
      <div class="editor-scroll">
        <div id="gutter" class="editor-gutter"></div>
        <div id="warnings" class="editor-warnings"></div>
        <pre class="editor-highlight language-javascript language-js" id="highlight"></pre>
        <textarea id="editorInner" spellcheck="false">
function foo() {
  bar = 'bar'
  // comments

}
        </textarea>
      </div>
      <div id="drawer" class="editor-status">
        <div id="cursor" class="editor-cursor"></div>
      </div>
    </div>
    <script src="editor.js"></script>
  </body>
</html>
