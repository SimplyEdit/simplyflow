<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyFlow code editor with domsignal</title>
    <!-- href="prism.css" rel="stylesheet" -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/prismjs/prism-themes/themes/prism-cb.css">
    <link rel="stylesheet" href="helene.css">
    <script src="prism.js" data-manual></script>
    <!-- script src="acorn.js"></script -->
    <script src="../../dist/simply.flow.js" ></script>
  </head>
  <body>
    <h1>SimplyFlow code editor with domSignal</h1>
    <p>Editor:</p>
        <textarea id="editorInner" data-helene-language="javascript" spellcheck="false">
function foo() {
  bar = 'bar'
  // comments

}
        </textarea>
    <script type="module">
      import helene, {parseJavascript} from './editor.mjs'

      const editor = helene({
        textarea: document.getElementById('editorInner')
      })
      editor.addEffect(parseJavascript)
      globalThis.editor = editor
    </script>
  </body>
</html>
