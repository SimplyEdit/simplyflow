<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyFlow editor with domsignal</title>
    <link href="prism.css" rel="stylesheet" />
    <style>
      .editor {
        font-family: monospace;
        font-size: 1rem;
        line-height: normal;
        display: grid;
        grid-template: "gutter editor";
        grid-template-columns: 1fr 100%;
        tab-size: 4;
      }
      pre[class*="language-"],
      .editor-highlight,
      .editor textarea {
        font-size: inherit;
        font-family: inherit;
        grid-area: editor;
        border: none;
        background-color: inherit;
        margin: 0;
        padding: 0;
        line-height: inherit;
        tab-size: inherit;
        white-space: pre;
      }
      .editor-gutter {
        background-color: #CCCC;
        grid-area: gutter;
        padding: 0 5px;
        text-align: right;
      }
      .editor-lines {
        margin: 0;
        font-size: inherit;
        line-height: inherit;
        white-space: pre;
      }
      .editor textarea {
        background: transparent;
        color: transparent;
        caret-color: red;
      }
    </style>
    <script src="prism.js" data-manual></script>
  </head>
  <body>
    <h1>SimplyFlow editor with domSignal</h1>
    <p>Editor:</p>
    <div id="editor" class="editor" data-code-lang="js">
      <div id="gutter" class="editor-gutter"></div>
      <pre class="editor-highlight language-js" id="highlight"></pre>
      <textarea id="editorInner" spellcheck="false">
Start with a few lines
like this
and some more
      </textarea>
    </div>
    <script src="../../dist/simply.flow.js"></script>
    <script>
      const editor = document.getElementById('editor')
      const editorContent = document.getElementById('editorInner')
      const highlight = document.getElementById('highlight')
      const state = simply.state.signal({})
      const demo = simply.state.domSignal(editorContent)
      const gutter = document.getElementById('gutter')
      simply.state.effect(() => {
        state.content = demo.value
        state.linecount = demo.value.split("\n").length
      })

      simply.state.effect(() => {
        updateLines(editor, state.linecount)
      })

      simply.state.effect(() => {
        highlight.innerHTML = Prism.highlight(state.content, Prism.languages.javascript, 'javascript')
      })

      function updateLines(container, lines) {
        gutter.innerHTML = Array.from({
          length: lines
        }, (_, i) => i).join("\n")
      }

    </script>
  </body>
</html>
