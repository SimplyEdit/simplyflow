<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyFlow editor with domsignal</title>
    <!-- link href="prism.css" rel="stylesheet" / -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/prismjs/prism-themes/themes/prism-cb.css">
    <style>
      .editor {
        font-family: monospace;
        font-size: 1rem;
        line-height: normal;
        display: grid;
        grid-template: "gutter editor";
        grid-template-columns: 1fr 100%;
        gap: 3px;
        tab-size: 4;
        background-color: #333;
        border-radius: 5px;
        overflow: hidden;
      }
      pre[class*="language-"],
      .editor-highlight,
      .editor textarea {
        font-size: inherit;
        font-family: inherit;
        grid-area: editor;
        border: none;
        background-color: inherit;
        margin: 0;
        padding: 0;
        line-height: inherit;
        tab-size: inherit;
        white-space: pre;
      }
      .editor textarea:focus {
        outline: none;
      }
      .editor-gutter {
        background-color: #444;
        grid-area: gutter;
        padding: 0 5px;
        text-align: right;
        color: #CCC;
      }
      .editor-lines {
        margin: 0;
        font-size: inherit;
        line-height: inherit;
        white-space: pre;
      }
      .editor textarea {
        background: transparent;
        color: transparent;
        caret-color: red;
      }
      pre[class*="language-"],
      .editor textarea,
      .editor-gutter {
        padding-top: 3px;
        padding-bottom: 3px;
      }
    </style>
    <script src="prism.js" data-manual></script>
  </head>
  <body>
    <h1>SimplyFlow editor with domSignal</h1>
    <p>Editor:</p>
    <div id="editor" class="editor" data-code-lang="js">
      <div id="gutter" class="editor-gutter"></div>
      <pre class="editor-highlight language-html" id="highlight"></pre>
      <textarea id="editorInner" spellcheck="false">
<html>
<style>
.foo {
  color: red;
}
</style>
<script>
function bar() {
}
</script>
      </textarea>
    </div>
    <script src="../../dist/simply.flow.js"></script>
    <script>
      const editor = document.getElementById('editor')
      const editorContent = document.getElementById('editorInner')
      const highlight = document.getElementById('highlight')
      const state = simply.state.signal({})
      const demo = simply.dom.signal(editorContent)
      const gutter = document.getElementById('gutter')
      simply.state.effect(() => {
        state.content = demo.value
        state.linecount = demo.value.split("\n").length
      })

      simply.state.effect(() => {
        updateLines(editor, state.linecount)
      })

      simply.state.effect(() => {
        highlight.innerHTML = Prism.highlight(state.content, Prism.languages.html, 'html')
      })

      function updateLines(container, lines) {
        gutter.innerHTML = Array.from({
          length: lines
        }, (_, i) => i).join("\n")
      }

      editorContent.addEventListener('keydown', function(evt) {
        if (evt.key=='Tab') {
          let startPos = editorContent.selectionStart
          editorContent.value = editorContent.value.substring(0, startPos) + "\t" + editorContent.value.substring(startPos)
          editorContent.selectionStart = startPos + 1
          editorContent.selectionEnd = editorContent.selectionStart
          evt.preventDefault()
          evt.target.dispatchEvent(new Event('input', { bubbles: true }));
        }
      })
    </script>
  </body>
</html>
