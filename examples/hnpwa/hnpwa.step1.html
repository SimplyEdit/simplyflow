<!doctype html>
<meta charset="utf-8">
<title>HNPWA step 1</title>
<link rel="stylesheet" href="hnpwa.css">
<h1>HNPWA - simply, step 1</h1>
<ul data-flow-list="items">
<template>
    <li>
        <span data-flow-field="title">title</span>
    </li>
</template>
</ul>
<script type="importmap">
  {
    "imports": {
      "SimplyView":"../../../simplyview/src/everything.mjs",
      "SimplyFlow":"../../src/flow.mjs",
      "@muze-nl/metro": "https://cdn.jsdelivr.net/npm/@muze-nl/metro@0.6.19/src/everything.mjs"
    }
  }
</script>
<script type="module">
import 'SimplyView'
import 'SimplyFlow'
import '@muze-nl/metro'

var hnpwa = simply.app({
  routes: {
    '/': async function() {
      this.actions.news()
    }
  },
  actions: {
    news: async function(page=1) {
      this.state.items = await this.api.news(page)
    }
  },
  state: simply.state.signal({
    items: []
  }),
  api: metro.jsonApi(
    'https://api.hackerwebapp.com/',
    {
      news: function(page=1) {
        return this.get('news', new URLSearchParams({ page }))
      }
    }
  ),
  hooks: {
    start: function() {
      simply.bind({
          root: this.state
      })
    }
  }
})
hnpwa.start()
</script>
